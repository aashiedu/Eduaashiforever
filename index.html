
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I love you haha… Edu baby 💋</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Comic Sans MS', cursive, sans-serif;
            background: linear-gradient(135deg, #ffeef8 0%, #ffd6e7 50%, #ffcccb 100%);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
            cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32"><circle cx="16" cy="16" r="8" fill="%23ff69b4" opacity="0.7"/></svg>'), auto;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
            text-align: center;
            position: relative;
            z-index: 10;
        }

        h1 {
            font-size: 2.5em;
            color: #ff1493;
            text-shadow: 2px 2px 4px rgba(255,255,255,0.8);
            margin-bottom: 20px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-10px); }
            60% { transform: translateY(-5px); }
        }

        p {
            font-size: 1.3em;
            color: #ff69b4;
            margin-bottom: 40px;
            line-height: 1.5;
            font-weight: bold;
            text-shadow: 1px 1px 2px rgba(255,255,255,0.9);
        }

        .feature {
            margin: 30px 0;
            padding: 20px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 20px;
            box-shadow: 0 8px 25px rgba(255, 105, 180, 0.3);
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .feature:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 35px rgba(255, 105, 180, 0.4);
        }

        button {
            background: linear-gradient(45deg, #ff69b4, #ff1493);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.1em;
            border-radius: 50px;
            cursor: pointer;
            font-family: inherit;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 105, 180, 0.4);
            position: relative;
            overflow: hidden;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(255, 105, 180, 0.6);
        }

        button:active {
            transform: scale(0.98);
        }

        .slider-container {
            margin: 20px 0;
        }

        input[type="range"] {
            width: 70%;
            height: 8px;
            border-radius: 5px;
            background: #ffe4e1;
            outline: none;
            -webkit-appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 25px;
            height: 25px;
            border-radius: 50%;
            background: #ff69b4;
            cursor: pointer;
            box-shadow: 0 2px 10px rgba(255, 105, 180, 0.5);
        }

        .response {
            margin-top: 15px;
            font-size: 1.2em;
            color: #ff1493;
            font-weight: bold;
            min-height: 40px;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.5s ease;
        }

        .response.show {
            opacity: 1;
            transform: translateY(0);
        }

        .balloon {
            position: absolute;
            width: 60px;
            height: 80px;
            background: linear-gradient(45deg, #ff69b4, #ffb6c1);
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            cursor: pointer;
            animation: float 6s infinite ease-in-out;
            box-shadow: 0 4px 15px rgba(255, 105, 180, 0.4);
            z-index: 5;
        }

        .balloon::after {
            content: '';
            position: absolute;
            bottom: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 2px;
            height: 20px;
            background: #333;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(-2deg); }
            50% { transform: translateY(-20px) rotate(2deg); }
        }

        .pop-message {
            position: absolute;
            background: rgba(255, 255, 255, 0.95);
            padding: 10px 15px;
            border-radius: 15px;
            font-size: 0.9em;
            color: #ff1493;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            pointer-events: none;
            animation: pop 2s ease-out forwards;
            z-index: 20;
        }

        @keyframes pop {
            0% {
                transform: scale(0) rotate(0deg);
                opacity: 1;
            }
            50% {
                transform: scale(1.2) rotate(10deg);
            }
            100% {
                transform: translateY(-50px) scale(0.8) rotate(20deg);
                opacity: 0;
            }
        }

        .hearts {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .heart {
            position: absolute;
            font-size: 20px;
            color: #ff69b4;
            animation: heartFloat 4s infinite linear;
        }

        @keyframes heartFloat {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(-100px) rotate(360deg);
                opacity: 0;
            }
        }

        .secret-button {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: 3px dashed #ff69b4;
            color: #ff69b4;
            padding: 10px 15px;
            border-radius: 15px;
            font-size: 0.9em;
            cursor: pointer;
            opacity: 0.7;
            transition: all 0.3s ease;
        }

        .secret-button:hover {
            opacity: 1;
            background: rgba(255, 105, 180, 0.1);
            transform: scale(1.1);
        }

        .secret-message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(45deg, #ff1493, #ff69b4);
            color: white;
            padding: 40px;
            border-radius: 25px;
            font-size: 1.5em;
            box-shadow: 0 20px 50px rgba(255, 20, 147, 0.5);
            z-index: 100;
            max-width: 90%;
            display: none;
        }

        @keyframes secretReveal {
            to {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
        }

        .close-secret {
            position: absolute;
            top: 10px;
            right: 15px;
            background: none;
            border: none;
            color: white;
            font-size: 1.5em;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="hearts" id="hearts"></div>
    
    <button class="secret-button" id="secretBtn">🤫</button>
    <div class="secret-message" id="secretMsg">
        <button class="close-secret" onclick="closeSecret()">✕</button>
        okay this one is serious… you’re really important to me 💕
    </div>

    <div class="container">
        <h1>I love you haha… Edu baby 💋</h1>
        <p>You’re my peace, but also the reason I smile at my phone like an idiot. Life just feels better with you in it.</p>

        <div class="feature">
            <button id="riskBtn">click at your own risk ⚠️</button>
            <div class="response" id="riskResponse"></div>
        </div>

        <div class="feature">
            <div>How much do I love you?</div>
            <div class="slider-container">
                <input type="range" id="loveSlider" min="0" max="100" value="50">
            </div>
            <div class="response" id="sliderResponse">more than that</div>
        </div>

        <div class="feature">
            <button id="thoughtBtn">what am I thinking right now? 🤔</button>
            <div class="response" id="thoughtResponse"></div>
        </div>
    </div>

    <script>
        // Balloon messages
        const balloonMessages = [
            "you're my peace fr",
            "why are you so cute??",
            "I was being productive until I thought of you",
            "you're actually mine btw 😌",
            "I'd still choose you every time"
        ];

        // Random thoughts
        const randomThoughts = [
            "wondering if you're smiling right now 💕",
            "should I text him again? yes. immediately.",
            "his smile is illegal fr",
            "counting down until I see you 😍",
            "you're my favorite distraction",
            "why does thinking about you make me blush?",
            "I need to kiss you ASAP",
            "you're stuck with me forever btw 😏"
        ];

        // Create floating balloons
        function createBalloon() {
            const balloon = document.createElement('div');
            balloon.className = 'balloon';
            balloon.style.left = Math.random() * 100 + '%';
            balloon.style.animationDuration = (Math.random() * 3 + 4) + 's';
            balloon.style.animationDelay = Math.random() * 2 + 's';

            balloon.addEventListener('click', function() {
                const message = document.createElement('div');
                message.className = 'pop-message';
                message.textContent = balloonMessages[Math.floor(Math.random() * balloonMessages.length)];
                message.style.left = balloon.style.left;
                message.style.top = balloon.offsetTop + 'px';
                document.body.appendChild(message);

                balloon.style.display = 'none';
                setTimeout(() => {
                    message.remove();
                }, 4000);
            });

            document.body.appendChild(balloon);

            setTimeout(() => {
                balloon.remove();
            }, 8000);
        }

        // Create floating hearts
        function createHeart() {
            const heart = document.createElement('div');
            heart.className = 'heart';
            heart.innerHTML = '💕';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = (Math.random() * 3 + 3) + 's';
            
            document.getElementById('hearts').appendChild(heart);
            
            setTimeout(() => {
                heart.remove();
            }, 4000);
        }

        // Event listeners
        document.getElementById('riskBtn').addEventListener('click', function() {
            const response = document.getElementById('riskResponse');
            response.textContent = "you're about to see how much I love you… don't get too confident 😌";
            response.classList.add('show');
        });

        document.getElementById('loveSlider').addEventListener('input', function() {
            const response = document.getElementById('sliderResponse');
            response.textContent = "more than that 💕";
            response.classList.add('show');
        });

        document.getElementById('thoughtBtn').addEventListener('click', function() {
            const response = document.getElementById('thoughtResponse');
            response.textContent = randomThoughts[Math.floor(Math.random() * randomThoughts.length)];
            response.classList.add('show');
        });

        document.getElementById('secretBtn').addEventListener('click', function() {
            document.getElementById('secretMsg').style.display = 'block';
        });

        function closeSecret() {
            document.getElementById('secretMsg').style.display = 'none';
        }

        // Initialize
        setInterval(createBalloon, 2000);
        setInterval(createHeart, 1000);

        // Show initial slider response
        document.getElementById('sliderResponse').classList.add('show');
    </script>
</body>
</html>
